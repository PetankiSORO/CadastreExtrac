name: "⛏️ Extraction du cadastre minier (6h)"

on:
  schedule:
    # Exécution toutes les 6 heures : 00h, 06h, 12h, 18h UTC
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

jobs:
  cadastre-extract:
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Cloner le repository"
        uses: actions/checkout@v4

      - name: "🐍 Configurer Python 3.11"
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: "📦 Installer les dépendances"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "🔑 Écriture des credentials Google Drive (Service Account)"
        env:
          GDRIVE_SA_JSON: ${{ secrets.GDRIVE_SA_JSON }}
        run: |
          mkdir -p /tmp
          echo "$GDRIVE_SA_JSON" > /tmp/gdrive_credentials.json
          chmod 600 /tmp/gdrive_credentials.json

      - name: "⛏️ Extraction du cadastre minier"
        env:
          # ⚠️ SECRETS — JAMAIS dans le code source
          URL_CADASTRE:           ${{ secrets.URL_CADASTRE }}
          PROXY_BASE:             ${{ secrets.PROXY_BASE }}
          PROXY_REFERER:          ${{ secrets.PROXY_REFERER }}
          DRIVE_FOLDER_ID:        ${{ secrets.DRIVE_FOLDER_ID }}
          GDRIVE_CLIENT_ID:       ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET:   ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN:   ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_SA_JSON:         ${{ secrets.GDRIVE_SA_JSON }}
          GDRIVE_CREDENTIALS_FILE: /tmp/gdrive_credentials.json
          LOG_LEVEL: INFO
        run: python main.py

      - name: "📁 Upload artefacts GitHub (debug 7 jours)"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "cadastre-output-${{ github.run_id }}"
          path: data/
          retention-days: 7

      - name: "✅ Notification succès"
        if: success()
        run: |
          echo "✅ Extraction réussie à $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: "🚨 Création d'une issue en cas d'échec"
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ Échec extraction cadastre — ${new Date().toISOString().split('T')[0]} ${new Date().toISOString().split('T')[1].split('.')[0]} UTC`,
              body: [
                "## Détails de l'erreur",
                `- **Run ID** : ${context.runId}`,
                `- **Branch** : ${context.ref}`,
                `- **Lien** : [Voir le workflow](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                "",
                "## Vérifier",
                "1. Les logs du workflow",
                "2. La disponibilité de l'API Landfolio",
                "3. Les secrets GitHub configurés :",
                "   - `URL_CADASTRE`",
                "   - `PROXY_BASE`",
                "   - `PROXY_REFERER`",
                "   - `DRIVE_FOLDER_ID`",
                "   - `GDRIVE_CLIENT_ID`",
                "   - `GDRIVE_CLIENT_SECRET`",
                "   - `GDRIVE_REFRESH_TOKEN`",
                "   - `GDRIVE_SA_JSON`",
                "4. Les quotas Google Drive",
              ].join("\n"),
              labels: ["bug", "automated"],
            });
