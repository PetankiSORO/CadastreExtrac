name: run

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6,18 * * *"  # 2x/j à 06:00 et 18:00 UTC

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      OUTPUT_DIR: outputs
      DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
      GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
      GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
      GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Inspecter l’arborescence (avant)
        run: |
          echo "***"
          echo "Contenu racine :"; ls -la
          echo "Contenu de outputs/ (s'il existe) :"
          if [ -d outputs ]; then
            find outputs -maxdepth 1 -type f -printf "%TY-%Tm-%Td %TH:%TM %p (%s bytes)\n" | sort || true
          fi

      - name: Run scraper (Python)
        run: |
          python main.py

      - name: Inspecter l’arborescence (après)
        if: always()
        run: |
          echo "Contenu de outputs/ après exécution :"
          if [ -d outputs ]; then
            find outputs -maxdepth 1 -type f -printf "%TY-%Tm-%Td %TH:%TM %p (%s bytes)\n" | sort || true
          else
            echo "Le dossier 'outputs' n'existe pas."
            exit 1
          fi

      - name: Upload outputs as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scraper-outputs
          path: outputs/**
          retention-days: 7
          if-no-files-found: warn
